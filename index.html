<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itinéraire à Paris - Denza</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #fdfcf9; /* Cor de fundo leve para combinar com o convite */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); /* Sombra suave para destacar a imagem */
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="convite.png" alt="Convite Itinéraire à Paris - Denza">

</body>
</html>
