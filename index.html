<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itinéraire à Paris - Denza</title>
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #fdfcf9; /* Cor de fundo que combina com o papel do convite */
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Alinha ao topo para permitir scroll se a imagem for longa */
            overflow-x: hidden; /* Evita scroll lateral */
        }

        /* Aplicação do estilo sugerido pelo seu amigo */
        .container {
            max-width: 1080px; /* Garante boa resolução em telas grandes */
            margin: 0 auto; 
            padding: 20px; /* Dá um respiro nas bordas em telas menores */
            display: flex;
            justify-content: center;
        }

        img {
            width: 100%; /* Ocupa 100% da largura do container (até o limite de 1080px) */
            height: auto; /* Mantém a proporção original */
            display: block;
            /* Sombra suave para dar profundidade em telas maiores */
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- A imagem agora se ajusta automaticamente respeitando as novas margens e largura máxima -->
        <img src="convite.png" alt="Convite Itinéraire à Paris - Denza">
    </div>
</body>
</html>
